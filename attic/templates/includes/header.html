{% load static %}

{% with request.resolver_match.view_name as view_name %} 

<nav class="navbar navbar-light" style="background-color: lightskyblue">
  <div class="container">
    <div class="d-flex align-items-center">
      <a class="navbar-brand mr-auto" href="{% url 'books:index' %}">
        <img 
          src="{% static 'img/logo.png' %}"
          width="90" height="90" 
          class="d-inline-block align-top" 
          alt=""
        >
      </a>
      <span class="h1 ml-2 my-0">Аттик</span>
    </div>
    <ul class="nav nav-pills">
      <li class="nav-item">
        <a class="nav-link {% if view_name == 'books:index' %} active {% endif %}" href="{% url 'books:index' %}">О сайте</a>
      </li>
      <li class="nav-item">              
        <a class="nav-link {% if view_name == 'books:index' %} active {% endif %}" href="{% url 'books:index' %}">Каталог книг</a>
      </li>
      {% if user.is_authenticated %}
        <li class="nav-item">
          <a class="nav-link {% if view_name == 'books:index' %} active {% endif %}" href="{% url 'books:index' %}">Авторы</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if view_name == 'books:index' %} active {% endif %}" href="{% url 'books:index' %}">Новые книги на сайте</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if view_name == 'books:index' %} active {% endif %}" href="{% url 'books:index' %}">Выйти</a>
        </li>
        <li>Пользователь: </li>
      {% else %}
        <li class="nav-item">
          <a class="nav-link {% if view_name == 'books:index' %} active {% endif %}" href="{% url 'books:index' %}">Войти</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if view_name == 'books:index' %} active {% endif %}" href="{% url 'books:index' %}">Регистрация</a>
        </li>
      {% endif %}
    </ul>
  </div>
</nav>      
{% endwith %}
