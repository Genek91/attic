{% extends 'base.html' %}

{% block title %}
Каталог книг
{% endblock %}

{% block content %}
<div>
    <h1>
        Каталог книг
    </h1>
</div>
{% for genre in genres %}
<div>
<ul>
    <li>
        <a href="{% url 'books:id_genre' genre.id %}">
            <h4>
                {{ genre }}
            </h4>
        </a>
    </li>
</ul>
</div>
{% endfor %}
{% endblock %}
