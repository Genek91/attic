{% extends 'base.html' %}

{% block title %}
Книги
{% endblock %}

{% block content %}
    {% for book in books %}
    <div>
        <ul>
            <li>
                <h4>
                    {{ book.id }}.
                    {{ book.name }}.
                    {{ book.author }}.
                    {{ book.book_add_date }}.
                    {{ book.pub_house }}.
                </h4>
            </li>
        </ul>
    </div>
    {% endfor %}
{% endblock %}
